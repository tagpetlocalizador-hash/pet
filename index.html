<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>PET NFC</title>

    <meta name="theme-color" content="#0d6efd">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link href="css/style.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container py-4">

    <!-- LOGO -->
    <div class="text-center mb-4">

        <img src="img/logo.png"
             alt="PET NFC"
             class="img-fluid"
             style="max-width:140px;">

        <h2 class="fw-bold mt-3">
            PET NFC
        </h2>

    </div>

    <!-- ================= LOADING ================= -->

    <div id="loading">

        <div class="text-center">

            <div class="spinner-border text-primary mb-3"></div>

            <h5>Carregando...</h5>

        </div>

    </div>

    <!-- ================= CADASTRO ================= -->

    <div id="cadastro" style="display:none;">

        <div class="card shadow">

            <div class="card-body">

                <h4 class="text-center mb-4">

                    Cadastro do Pet

                </h4>

                <div class="text-center mb-3">

                    <img

                        id="previewFoto"

                        src="img/pet-default.png"

                        class="rounded-circle border"

                        width="150"

                        height="150">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Foto

                    </label>

                    <input

                        type="file"

                        id="foto"

                        class="form-control"

                        accept="image/*">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Nome do Pet

                    </label>

                    <input

                        id="nomePet"

                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Nome do Tutor

                    </label>

                    <input

                        id="nomeTutor"

                        class="form-control">

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        WhatsApp

                    </label>

                    <input

                        id="whatsapp"

                        class="form-control">

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        E-mail

                    </label>

                    <input

                        id="email"

                        type="email"

                        class="form-control">

                </div>

                <button

                    id="btnCadastrar"

                    class="btn btn-primary w-100 btn-lg">

                    Cadastrar

                </button>

            </div>

        </div>

    </div>

    <!-- ================= PERFIL ================= -->

    <div id="perfil" style="display:none;">

        <div class="card shadow">

            <div class="card-body">

                <div class="text-center">

                    <img

                        id="fotoPerfil"

                        src="img/pet-default.png"

                        class="rounded-circle border"

                        width="180"

                        height="180">

                    <h3

                        id="perfilNomePet"

                        class="mt-3">

                        Nome do Pet

                    </h3>

                    <p

                        id="perfilTutor"

                        class="text-muted">

                        Tutor

                    </p>

                </div>

                <hr>

                <button

                    id="btnLocalizacao"

                    class="btn btn-success w-100 btn-lg">

                    <i class="bi bi-geo-alt-fill"></i>

                    Encontrei este Pet

                </button>

            </div>

        </div>

    </div>

    <!-- ================= MENSAGEM ================= -->

    <div

        id="mensagem"

        style="display:none;"

        class="mt-4">

        <div class="alert alert-success text-center">

            Obrigado.

            A localização foi enviada ao tutor.

        </div>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>

</body>

</html>
