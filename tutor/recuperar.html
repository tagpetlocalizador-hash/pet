<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="theme-color"
        content="#245b35"
    >

    <title>Recuperar senha | PET NFC</title>

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="../assets/css/tutor.css"
    >

</head>

<body class="pagina-login">


    <main class="container-login">


        <section class="card-login">


            <!-- CABEÇALHO -->

            <header class="cabecalho-login">

                <img
                    src="../assets/img/logo.png"
                    alt="PET NFC"
                    class="logo-login"
                >

                <div class="icone-login">
                    🔐
                </div>

                <span class="etiqueta-login">
                    Área do tutor
                </span>

                <h1 class="titulo-login">
                    Recuperar senha
                </h1>

                <p class="subtitulo-login">
                    Informe o e-mail utilizado no cadastro
                </p>

            </header>



            <!-- FORMULÁRIO -->

            <form
                id="formRecuperacao"
                class="formulario-login"
                novalidate
            >


                <div class="grupo-campo">

                    <label
                        for="email"
                        class="rotulo-campo"
                    >
                        E-mail
                    </label>

                    <div class="campo-com-icone">

                        <span
                            class="icone-campo"
                            aria-hidden="true"
                        >
                            ✉
                        </span>

                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="campo-login"
                            placeholder="seuemail@exemplo.com"
                            autocomplete="email"
                            required
                        >

                    </div>

                </div>



                <button
                    type="submit"
                    id="botaoEnviar"
                    class="botao-login"
                >

                    <span
                        id="iconeBotao"
                        aria-hidden="true"
                    >
                        ➤
                    </span>

                    <span id="textoBotao">
                        Enviar instruções
                    </span>

                </button>



                <div
                    id="mensagem"
                    class="mensagem-login"
                    role="alert"
                    aria-live="polite"
                ></div>


            </form>



            <!-- AVISO -->

            <div class="aviso-seguranca">

                <span
                    class="icone-aviso"
                    aria-hidden="true"
                >
                    ℹ
                </span>

                <p>
                    Por segurança, a página não informa se o
                    e-mail está ou não cadastrado. Verifique
                    também a pasta de spam ou lixo eletrônico.
                </p>

            </div>



            <!-- VOLTAR -->

            <a
                href="login.html"
                class="link-voltar"
            >
                ← Voltar para o login
            </a>


        </section>



        <footer class="rodape-login">

            <p>
                Identificação digital e proteção para seu pet
            </p>

        </footer>


    </main>



    <!--
        A ORDEM DOS SCRIPTS É OBRIGATÓRIA.

        Primeiro config.js.
        Depois api.js.
    -->

    <script src="../assets/js/config.js"></script>

    <script src="../assets/js/api.js"></script>



    <script>

        /********************************************
         * ELEMENTOS
         ********************************************/

        const formRecuperacao =
            document.getElementById(
                "formRecuperacao"
            );

        const campoEmail =
            document.getElementById(
                "email"
            );

        const botaoEnviar =
            document.getElementById(
                "botaoEnviar"
            );

        const textoBotao =
            document.getElementById(
                "textoBotao"
            );

        const iconeBotao =
            document.getElementById(
                "iconeBotao"
            );

        const mensagem =
            document.getElementById(
                "mensagem"
            );



        /********************************************
         * EXIBIR MENSAGEM
         ********************************************/

        function exibirMensagem(
            texto,
            tipo
        ) {

            mensagem.textContent = texto;

            mensagem.className =
                "mensagem-login " +
                "mensagem-" +
                tipo;

        }



        /********************************************
         * LIMPAR MENSAGEM
         ********************************************/

        function limparMensagem() {

            mensagem.textContent = "";

            mensagem.className =
                "mensagem-login";

        }



        /********************************************
         * CARREGAMENTO
         ********************************************/

        function definirCarregamento(
            carregando
        ) {

            botaoEnviar.disabled =
                carregando;

            campoEmail.disabled =
                carregando;

            if (carregando) {

                textoBotao.textContent =
                    "Enviando...";

                iconeBotao.textContent =
                    "⏳";

                botaoEnviar.classList.add(
                    "carregando"
                );

            } else {

                textoBotao.textContent =
                    "Enviar instruções";

                iconeBotao.textContent =
                    "➤";

                botaoEnviar.classList.remove(
                    "carregando"
                );

            }

        }



        /********************************************
         * VALIDAR E-MAIL
         ********************************************/

        function emailValido(email) {

            const expressao =
                /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            return expressao.test(email);

        }



        /********************************************
         * ENVIAR FORMULÁRIO
         ********************************************/

        formRecuperacao.addEventListener(

            "submit",

            async function(evento) {

                evento.preventDefault();

                limparMensagem();


                const email =
                    campoEmail.value
                        .trim()
                        .toLowerCase();


                if (!email) {

                    exibirMensagem(
                        "Informe seu endereço de e-mail.",
                        "erro"
                    );

                    campoEmail.focus();

                    return;

                }


                if (!emailValido(email)) {

                    exibirMensagem(
                        "Informe um endereço de e-mail válido.",
                        "erro"
                    );

                    campoEmail.focus();

                    return;

                }


                definirCarregamento(true);


                try {

                    if (
                        typeof API ===
                        "undefined"
                    ) {

                        throw new Error(
                            "O arquivo api.js não foi carregado."
                        );

                    }


                    if (
                        typeof API
                            .solicitarRecuperacao !==
                        "function"
                    ) {

                        throw new Error(
                            "A função solicitarRecuperacao não foi encontrada."
                        );

                    }


                    const resposta =
                        await API
                            .solicitarRecuperacao(
                                email
                            );


                    if (
                        resposta &&
                        resposta.sucesso
                    ) {

                        exibirMensagem(

                            resposta.mensagem ||

                            "As instruções de recuperação foram enviadas para o seu e-mail.",

                            "sucesso"

                        );

                        formRecuperacao.reset();

                    } else {

                        exibirMensagem(

                            resposta?.mensagem ||

                            "Não foi possível enviar as instruções de recuperação.",

                            "erro"

                        );

                    }

                } catch (erro) {

                    console.error(
                        "Erro ao solicitar recuperação:",
                        erro
                    );

                    exibirMensagem(
                        "Erro ao conectar ao servidor.",
                        "erro"
                    );

                } finally {

                    definirCarregamento(false);

                }

            }

        );

    </script>


</body>

</html>
