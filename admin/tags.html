<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>PET NFC Admin - TAGs</title>

    <meta name="theme-color" content="#0d6efd">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <link href="css/style.css" rel="stylesheet">

</head>

<body>

<div class="d-flex">

    <!-- MENU -->

    <aside class="sidebar">

        <div class="text-center py-4">

            <h3 class="fw-bold text-white">
                PET NFC
            </h3>

            <small class="text-light">
                Painel Administrativo
            </small>

        </div>

        <hr>

        <a href="index.html" class="menu-item">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="tags.html" class="menu-item active">
            <i class="bi bi-upc-scan"></i>
            TAGs
        </a>

        <a href="pets.html" class="menu-item">
            <i class="bi bi-heart-fill"></i>
            Pets
        </a>

        <a href="estatisticas.html" class="menu-item">
            <i class="bi bi-bar-chart-fill"></i>
            Estatísticas
        </a>

        <a href="configuracoes.html" class="menu-item">
            <i class="bi bi-gear-fill"></i>
            Configurações
        </a>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content container-fluid p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>TAGs</h2>

            <button
                id="btnNovaTag"
                class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>

                Nova TAG

            </button>

        </div>

        <div class="card dashboard-card">

            <div class="mb-3">

                <input
                    id="pesquisa"
                    class="form-control"
                    placeholder="Pesquisar TAG">

            </div>

            <div class="table-responsive">

                <table class="table table-hover align-middle">

                    <thead>

                        <tr>

                            <th>ID</th>
                            <th>TOKEN</th>
                            <th>STATUS</th>
                            <th>PET</th>
                            <th width="240">AÇÕES</th>

                        </tr>

                    </thead>

                    <tbody id="listaTags">

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<!-- =======================================================
     MODAL NOVA TAG
======================================================= -->

<div class="modal fade" id="modalNovaTag" tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">

                    Nova TAG criada

                </h5>

                <button
                    type="button"
                    class="btn-close"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <p>

                    <strong>ID:</strong>

                    <span id="novoId"></span>

                </p>

                <p>

                    <strong>Token:</strong>

                    <span id="novoToken"></span>

                </p>

                <div class="mb-3">

                    <label class="form-label">

                        URL

                    </label>

                    <input
                        id="novaUrl"
                        class="form-control"
                        readonly>

                </div>

            </div>

            <div class="modal-footer">

                <!-- NOVO BOTÃO -->

                <button
                    id="btnEtiqueta"
                    class="btn btn-primary">

                    <i class="bi bi-printer"></i>

                    Visualizar Etiqueta

                </button>

                <button
                    id="btnCopiar"
                    class="btn btn-success">

                    <i class="bi bi-clipboard"></i>

                    Copiar Link

                </button>

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Fechar

                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/config.js"></script>

<script src="js/api.js"></script>

<script src="js/tags.js"></script>

</body>

</html>
